apiVersion: clickhouse.altinity.com/v1
kind: ClickHouseInstallation
metadata:
  name: forensic-soc-db
  namespace: clickhouse
spec:
  configuration:
    zookeeper:
      nodes:
      - host: keeper-forensic-keeper.clickhouse.svc.cluster.local
        port: 2181

    clusters:
    - name: soc-cluster
      layout:
        shardsCount: 1
        replicasCount: 1

    settings:
      logger/level: information
      background_pool_size: "16"
      query_log/flush_interval_milliseconds: "5000"

    profiles:
      # Default profile: user-level session settings
      default/async_insert: "1"
      default/async_insert_max_data_size: "10485760"
      default/async_insert_busy_timeout_ms: "200"

      # Analyst: read-only, no DDL, no settings changes
      forensic_analyst/readonly: "2"
      forensic_analyst/allow_ddl: "0"

      # Ingest: INSERT allowed, no DELETE/ALTER/DDL.
      # Async insert: CH accumulates rows in RAM and flushes in bulk,
      # giving native-TCP-like throughput from vector's HTTP sink.
      # Moved here from the vector endpoint URL (?async_insert=1&…)
      # because CH 24.8 parses query-string bool settings strictly,
      # and vector's sink appends its own ?query=… — the two collide
      # and throw DB::Exception code 467 "Cannot parse bool".
      ingest_service/readonly: "0"
      ingest_service/allow_ddl: "0"
      ingest_service/allow_experimental_lightweight_delete: "0"
      ingest_service/allow_nondeterministic_mutations: "0"
      ingest_service/async_insert: "1"
      ingest_service/async_insert_max_data_size: "10485760"
      ingest_service/async_insert_busy_timeout_ms: "200"

    users:
      # Analyst user: SELECT only
      forensic_analyst/profile: forensic_analyst
      forensic_analyst/password: changeme-analyst
      forensic_analyst/networks/ip: "::/0"
      forensic_analyst/quota: default

      # Ingest user: INSERT only
      ingest_writer/profile: ingest_service
      ingest_writer/password: changeme-ingest
      ingest_writer/networks/ip: "::/0"
      ingest_writer/quota: default

  defaults:
    templates:
      podTemplate: forensic-pod
      dataVolumeClaimTemplate: data-volume
    replicasUseFQDN: "yes"

  templates:
    podTemplates:
    - name: forensic-pod
      spec:
        containers:
        - name: clickhouse
          # Pinned to 24.8 (LTS) instead of the floating :24.3 tag. The
          # :24.3 digest on Docker Hub has a known binary self-check bug
          # on kernel 6.1: restarts fail with exit code 246
          # (CHECKSUM_DOESNT_MATCH). 24.8 handles it.
          image: clickhouse/clickhouse-server:24.8
          resources:
            requests:
              memory: 512Mi
              cpu: 200m
            limits:
              memory: 2Gi
              cpu: 1000m

    volumeClaimTemplates:
    - name: data-volume
      spec:
        accessModes:
        - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
