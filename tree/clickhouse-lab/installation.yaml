apiVersion: clickhouse.altinity.com/v1
kind: ClickHouseInstallation
metadata:
  name: forensic-soc-db
  namespace: clickhouse
spec:
  configuration:
    zookeeper:
      nodes:
      - host: keeper-forensic-keeper.clickhouse.svc.cluster.local
        port: 2181

    clusters:
    - name: soc-cluster
      layout:
        shardsCount: 1
        replicasCount: 1

    settings:
      logger/level: information
      background_pool_size: "16"
      query_log/flush_interval_milliseconds: "5000"
      skip_check_for_incorrect_settings: "1"

    profiles:
      # Default profile: user-level session settings
      default/async_insert: "1"
      default/async_insert_max_data_size: "10485760"
      default/async_insert_busy_timeout_ms: "200"

      # Analyst: read-only, no DDL, no settings changes
      forensic_analyst/readonly: "2"
      forensic_analyst/allow_ddl: "0"

      # Ingest: INSERT allowed, no DELETE/ALTER/DDL
      ingest_service/readonly: "0"
      ingest_service/allow_ddl: "0"
      ingest_service/allow_experimental_lightweight_delete: "0"
      ingest_service/allow_nondeterministic_mutations: "0"

    users:
      # Analyst user: SELECT only
      forensic_analyst/profile: forensic_analyst
      forensic_analyst/password: changeme-analyst
      forensic_analyst/networks/ip: "::/0"
      forensic_analyst/quota: default

      # Ingest user: INSERT only
      ingest_writer/profile: ingest_service
      ingest_writer/password: changeme-ingest
      ingest_writer/networks/ip: "::/0"
      ingest_writer/quota: default

  defaults:
    templates:
      podTemplate: forensic-pod
      dataVolumeClaimTemplate: data-volume
    replicasUseFQDN: "yes"

  templates:
    podTemplates:
    - name: forensic-pod
      spec:
        containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:24.8
          resources:
            requests:
              memory: 4Gi
              cpu: 2
            limits:
              memory: 16Gi
              cpu: 8

    volumeClaimTemplates:
    - name: data-volume
      spec:
        accessModes:
        - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
