# Vector Helm values for iximiuz lab — kubescape node-agent → ClickHouse
# Deploy: helm install vector vector/vector -n honey -f values.yaml

role: "Agent"

image:
  repository: timberio/vector
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

tolerations:
  - operator: Exists

env:
  - name: NODE_NAME
    valueFrom:
      fieldRef:
        fieldPath: spec.nodeName
  - name: HOST_IP
    valueFrom:
      fieldRef:
        fieldPath: status.hostIP

customConfig:
  data_dir: /vector-data-dir
  api:
    enabled: true
    address: 127.0.0.1:8686
  sources:
    kubescape_nodeagent_logs:
      type: kubernetes_logs
      extra_label_selector: "app=node-agent"

  transforms:
    kubescape_parse:
      type: remap
      inputs:
        - kubescape_nodeagent_logs
      source: |
        . = parse_json!(.message)

    kubescape_filter:
      type: filter
      inputs:
        - kubescape_parse
      condition: '.BaseRuntimeMetadata != null'

    kubescape_enrich:
      type: remap
      inputs:
        - kubescape_filter
      source: |
        .CloudMetadata = "empty"
        .hostname = get_env_var!("NODE_NAME")
        ts, err = parse_timestamp(.BaseRuntimeMetadata.timestamp, "%+")
        # Transport the ORIGINAL kubescape timestamp at NANOSECOND resolution.
        # Truncating to seconds (the to_unix_timestamp default) collapses the AE
        # trigger watermark to 1s granularity and loses sub-second ordering. The
        # forensic_db.kubescape_logs schema partitions/TTLs event_time as nanos
        # (fromUnixTimestamp64Nano); AE normalizes seconds-or-nanos by magnitude.
        if err == null {
          .event_time = to_unix_timestamp(ts, unit: "nanoseconds")
        } else {
          .event_time = to_unix_timestamp(now(), unit: "nanoseconds")
        }
        # MITRE enrichment: node-agent's BaseRuntimeAlert struct (armoapi-go)
        # does not include mitreTactic / mitreTechnique fields, so they are
        # absent from the alert payload even though they are defined on the
        # Rule. Inject them here from a static map (regenerate with
        # ./build-values.sh <path-to-default-rules.yaml> when rules change).
        mitre_map = {
          "R0001": {"tactic": "TA0002", "technique": "T1059"},
          "R0002": {"tactic": "TA0009", "technique": "T1005"},
          "R0003": {"tactic": "TA0002", "technique": "T1059"},
          "R0004": {"tactic": "TA0002", "technique": "T1059"},
          "R0005": {"tactic": "TA0011", "technique": "T1071.004"},
          "R0006": {"tactic": "TA0006", "technique": "T1528"},
          "R0007": {"tactic": "TA0008", "technique": "T1210"},
          "R0008": {"tactic": "TA0006", "technique": "T1056.001"},
          "R0009": {"tactic": "TA0011", "technique": "T1095"},
          "R0010": {"tactic": "TA0006", "technique": "T1005"},
          "R0011": {"tactic": "TA0010", "technique": "T1041"},
          "R0012": {"tactic": "TA0005", "technique": "T1564"},
          "R0040": {"tactic": "TA0002", "technique": "T1059"},
          "R0041": {"tactic": "TA0011", "technique": "T1071"},
          "R0042": {"tactic": "TA0005", "technique": "T1564"},
          "R0043": {"tactic": "TA0001", "technique": "T1190"},
          "R1000": {"tactic": "TA0002", "technique": "T1059"},
          "R1001": {"tactic": "TA0005", "technique": "T1574"},
          "R1002": {"tactic": "TA0008", "technique": "T1021"},
          "R1003": {"tactic": "TA0005", "technique": "T1620"},
          "R1004": {"tactic": "TA0011", "technique": "T1090"},
          "R1005": {"tactic": "TA0005", "technique": "T1055"},
          "R1006": {"tactic": "TA0004", "technique": "T1611"},
          "R1007": {"tactic": "TA0040", "technique": "T1496"},
          "R1008": {"tactic": "TA0011", "technique": "T1071.004"},
          "R1009": {"tactic": "TA0011", "technique": "T1071"},
          "R1010": {"tactic": "TA0006", "technique": "T1005"},
          "R1011": {"tactic": "TA0005", "technique": "T1574.006"},
          "R1012": {"tactic": "TA0006", "technique": "T1005"},
          "R1015": {"tactic": "TA0005", "technique": "T1622"},
          "R1016": {"tactic": "TA0005", "technique": "T1565"},
          "R1030": {"tactic": "TA0002", "technique": "T1218"},
          "R1031": {"tactic": "TA0002", "technique": "T1609"}
        }
        rule_id = .RuleID || ""
        m = get(mitre_map, [rule_id]) ?? null
        if m != null {
          .BaseRuntimeMetadata.mitreTactic = m.tactic
          .BaseRuntimeMetadata.mitreTechnique = m.technique
        }
        del(.time)

  sinks:
    kubescape_debug:
      type: file
      inputs:
        - kubescape_enrich
      encoding:
        codec: json
      path: "/tmp/kubescape.json"

    kubescape_clickhouse:
      type: clickhouse
      inputs:
        - kubescape_enrich
      database: forensic_db
      table: kubescape_logs
      endpoint: "http://clickhouse-forensic-soc-db.clickhouse.svc.cluster.local:8123"
      skip_unknown_fields: true
      date_time_best_effort: true
      auth:
        strategy: "basic"
        user: ingest_writer
        password: changeme-ingest
      batch:
        max_bytes: 5000000
        timeout_secs: 2

    # S2: same enriched stream, node-local to the dx-daemon (DaemonSet on this
    # node), addressed by a stable DNS name — NOT by interpolating the node IP.
    #
    # Vector does NOT reliably interpolate ${HOST_IP} into an http-sink `uri`
    # through the customConfig path (the literal ${HOST_IP} reaches the URL
    # parser -> "invalid uri character" -> findings silently dropped -> dx
    # starves and looks blind). So we route via the dx-daemon ClusterIP Service
    # with `internalTrafficPolicy: Local`, which delivers only to the dx pod on
    # THIS node. Node-local, portable, zero interpolation.
    # Service manifest: tree/vector-lab/dx-daemon-service.yaml (apply it too).
    dx_daemon:
      type: http
      inputs:
        - kubescape_enrich
      # TLS so findings don't cross the CNI in cleartext. dx serves a self-signed
      # cert (DX_RECEIVER_TLS=1, entlein/dx#89); skip-verify since the DNS name
      # won't match the cert and honey ns has no CA. Revert to http:// if
      # DX_RECEIVER_TLS is off.
      uri: "https://dx-daemon.honey.svc.cluster.local:9099/findings"
      method: post
      tls:
        verify_certificate: false
      encoding:
        codec: json
      batch:
        max_events: 1
      request:
        retry_attempts: 3
